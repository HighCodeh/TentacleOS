name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semrel.outputs.new_release }}
      version: ${{ steps.semrel.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install \
            semantic-release \
            conventional-changelog-conventionalcommits \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee /tmp/semrel.log
          VERSION=$(grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' /tmp/semrel.log || echo "")
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' /tmp/semrel.log || echo "")
          fi
          if [ -n "$VERSION" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Release version: $VERSION"
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "No new release"
          fi

  build:
    name: Build & Upload
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Build
        run: bash tools/build.sh
        shell: bash

      - name: Rename binary
        run: cp firmware_p4/build/TentacleOS_P4.bin "TentacleOS_v${{ needs.release.outputs.version }}.bin"

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.release.outputs.version }}"
          files: "TentacleOS_v${{ needs.release.outputs.version }}.bin"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
